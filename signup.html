<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="min-h-screen flex items-center justify-center bg-gradient-to-r from-[rgb(80,22,18)] to-[rgb(28,22,41)]"
  >
    <div
      class="bg-white shadow-lg rounded-xl w-full max-w-5xl flex align-center flex-row md:flex-col"
    >
      <div class="w-full lg:w-1/2">
        <img
          src="assets/signup page.png"
          alt=""
          class="w-full h-full object-cover rounded-4xl p-2"
        />
      </div>
      <form id="signupForm" class="w-full lg:w-1/2 p-8">
        <h1 class="text-3xl font-bold mb-6 text-center text-[rgb(80,22,18)]">
          Create Account
        </h1>
        <input
          type="text"
          id="firstName"
          name="firstName"
          placeholder="First Name"
          class="w-full border p-3 rounded-md mb-4 border-2 border-[rgb(80,22,18)]"
        />
        <input
          type="text"
          id="lastName"
          name="lastName"
          placeholder="Last Name"
          class="w-full border p-3 rounded-md mb-4 border-2 border-[rgb(80,22,18)]"
        />
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Email"
          class="w-full border p-3 rounded-md mb-4 border-2 border-[rgb(80,22,18)]"
        />
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Password"
          class="w-full border p-3 rounded-md mb-4 border-2 border-[rgb(80,22,18)]"
        />
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          placeholder="Confirm Password"
          class="w-full border p-3 rounded-md mb-4 border-2 border-[rgb(80,22,18)]"
        />
        <select
          name="role"
          id="role"
          class="w-full border-2 border-[rgb(80,22,18)] p-3 rounded-md mb-4"
        >
          <option value="admin">Admin</option>
        </select>
        <button
          id="signupBtn"
          type="submit"
          class="w-full bg-gradient-to-r from-[rgb(80,22,18)] to-[rgb(28,22,41)] text-white p-3 rounded-md"
        >
          Signup
        </button>

        <div class="text-center pt-5">
          <small class="text-center"
            >Already have an account?
            <a href="index.html" class="text-blue-700 font-bold"
              >login</a
            ></small
          >
        </div>
      </form>
    </div>
  </body>
  <script src="signup.js"></script>
</html>
